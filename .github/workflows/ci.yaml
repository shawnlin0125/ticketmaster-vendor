# TicketMaster Vendor CI — vendor-level isolated testing
#
# This CI runs ONLY when this vendor repo changes.
# It does NOT know about other vendors — integration testing
# happens in the ticket-vendor meta-repo.

name: Vendor CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test TicketMaster Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install platform-plugin-sdk (from plugin-hub)
        run: |
          pip install git+https://github.com/shawnlin0125/plugin-hub.git@go-rewrite#subdirectory=platform-plugin-sdk

      - name: Install unified-ticket-api (from ticket-vendor meta-repo)
        run: |
          pip install git+https://github.com/shawnlin0125/ticket-vendor.git#subdirectory=unified-ticket-api

      - name: Install plugin + test deps
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --json-report --json-report-file=test-results.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
